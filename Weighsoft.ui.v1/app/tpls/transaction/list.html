<page-title ng-if="layoutOptions.pageTitles" title="Transaction" description="" data-ng-init="System.initialize()"></page-title>
<div class="hidden-print ">
    <div class="panel panel-color panel-danger">
        <div class="panel-heading">
            <div class="col-md-4 col-sm-6 col-xs-12">
                <h2>Transaction Management</h2>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <label class="control-label" for="timeTracker">Period</label>
                <div class="input-group" style="display: flex;">
                    <span class="input-btn">
                        <button class="btn btn-default" ng-click="System.clear()">Clear</button>
                    </span>
                    <input type="text" date-range-picker class="form-control date-picker" ng-model="date" options="System.options"/>
                </div>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <label for="company_id" class="control-label">GroupBy</label>
                <select name="group" id="group_id" class="form-control" ng-model="System.selectedGroup" ng-options="option.value as option.name for option in System.groupList" ng-change="System.filterGroup(System.selectedGroup)">
                </select>
            </div>
        </div>
        <div class="panel-body">
            <div class="row">
                <div class="col-sm-12">
                    <table datatable="ng" dt-column-defs="System.dtColumnDefs" dt-options="System.dtOptions" dt- class="table table-striped table-bordered" >
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Site</th>
                                <th>Weighing Type</th>
                                <th>Reg Number</th>
                                <th>Business Partner</th>
                                <th>Product</th>
                                <th>First Weight</th>
                                <th>Second Weight</th>
                                <th>Total Weight</th>
                                <th>Total Count</th>
                                <th>First Weighing Date</th>
                                <th>Second Weighing Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr data-ng-repeat="data in System.weighingData">
                                <td data-ng-bind="data.transaction"></td>
                                <td data-ng-bind="data.site"></td>
                                <td data-ng-bind="data.settings"></td>
                                <td data-ng-bind="data.RegNumber"></td>
                                <td data-ng-bind="data.businesspartner"></td>
                                <td data-ng-bind="data.product"></td>
                                <td data-ng-bind="data.FirstWeight"></td>
                                <td data-ng-bind="data.SecondWeight"></td>
                                <td data-ng-bind="data.TotalWeight"></td>
                                <td data-ng-bind="data.TotalNumber"></td>
                                <td data-ng-bind="data.created_at"></td>
                                <td data-ng-bind="data.updated_at"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
