<page-title ng-if="layoutOptions.pageTitles" title="System Cameras" description="" data-ng-init="System.initialize()"></page-title>
<div class="col-lg-12 col-md-12 ">
    <div class="panel panel-color panel-danger">
        <div class="panel-heading">
            <div class="col-md-4 col-sm-6 col-xs-12">
                <h2>Camera Management</h2>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <div class="form-group">
                    <label for="company_id" class="control-label">Company</label>
                    <select name="company_id" id="role_id" ng-model="System.HeaderSingle.company_id" class="form-control"
                        ng-change="System.onSelectChange('company')" ng-options="option.value as option.name for option in System.companyList">
                    </select>
                </div>
                <div class="form-group" ng-if="System.HeaderSingle.company_id !== null">
                    <label for="site_id" class="control-label">Site</label>
                    <select name="site_id" id="site_id" ng-model="System.HeaderSingle.site_id" class="form-control"
                        ng-change="System.onSelectChange('site')" ng-options="option.value as option.name for option in System.siteList">
                    </select>
                </div>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <div class="form-group" ng-if="System.HeaderSingle.site_id !== null">
                    <label for="workstation_id" class="control-label">Workstation</label>
                    <select name="workstation_id" id="workstation_id" ng-model="System.HeaderSingle.workstation_id" class="form-control" ng-change="System.onSelectChange('workstation')" ng-options="option.value as option.name for option in System.workstationList">
                    </select>
                </div>
                <div class="form-group" ng-if="System.HeaderSingle.workstation_id !== null">
                    <label for="weighbridge_id" class="control-label">Weighbridge</label>
                    <select name="weighbridge_id" id="weighbridge_id" ng-model="System.HeaderSingle.weighbridge_id" class="form-control" 
                            ng-options="option.value as option.name for option in System.weighbridgeList" ng-change="System.onSelectChange('weighbridge')">
                    </select>
                </div>
                <button type="button" data-ng-click="System.showAddForm()" ng-hide='System.isEditing' class="btn btn-black pull-right">
                    Add New
                </button>
            </div>
        </div>
        <div class="panel-body">
            <div ng-if="System.isEditing">
                <h3>Add / Edit</h3>
                <div class="col-md-8">
                    <form name="CRUD" ng-submit="System.saveForm(CRUD)">
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" class="form-control" id="name" ng-model="System.cameraInfo.name" required>
                        </div>
                        <div class="form-group">
                            <label>Number Plate Recognition</label>
                            <div class="btn-group" data-toggle="buttons">
                                <label class="btn btn-default" ng-class="{'active btn-success': System.cameraInfo.pn_recog === 'true'}">
                                    <input type="radio" ng-model="System.cameraInfo.pn_recog" value="true"> Yes
                                </label>
                                <label class="btn btn-default" ng-class="{'active btn-danger': System.cameraInfo.pn_recog === 'false'}">
                                    <input type="radio" ng-model="System.cameraInfo.pn_recog" value="false"> No
                                </label>
                            </div>
                            <small class="text-muted" ng-if="System.cameraInfo.pn_recog === 'true'">NPR is active</small>
                            <small class="text-muted" ng-if="System.cameraInfo.pn_recog === 'false'">NPR is inactive</small>
                        </div>
                        <div class="form-group">
                            <label for="ip_address">IP Address</label>
                            <input type="text" class="form-control" id="ip_address" ng-model="System.cameraInfo.ip_address" required>
                        </div>
                        <div class="form-group">
                            <label for="auth_type">Authentication Type</label>
                            <select class="form-control" id="auth_type" ng-model="System.cameraInfo.auth_type" ng-change="System.onAuthTypeChange()">
                                <option value="none">No Auth</option>
                                <option value="basic">Basic</option>
                                <option value="digest">Digest</option>
                            </select>
                        </div>
                        <div class="form-group" ng-if="System.cameraInfo.auth_type !== 'none'">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" id="username" ng-model="System.cameraInfo.username">
                        </div>
                        <div class="form-group" ng-if="System.cameraInfo.auth_type !== 'none'">
                            <label for="password">Password</label>
                            <input type="password" class="form-control" id="password" ng-model="System.cameraInfo.password">
                        </div>
                        <div class="form-group">
                            <label>Camera Active</label>
                            <div class="btn-group" data-toggle="buttons">
                                <label class="btn btn-default" ng-class="{'active btn-success': System.cameraInfo.camera_active === 'true'}">
                                    <input type="radio" ng-model="System.cameraInfo.camera_active" value="true"> Yes
                                </label>
                                <label class="btn btn-default" ng-class="{'active btn-danger': System.cameraInfo.camera_active === 'false'}">
                                    <input type="radio" ng-model="System.cameraInfo.camera_active" value="false"> No
                                </label>
                            </div>
                            <small class="text-muted" ng-if="System.cameraInfo.camera_active === 'true'">Camera is active</small>
                            <small class="text-muted" ng-if="System.cameraInfo.camera_active === 'false'">Camera is inactive</small>
                        </div>
                        <div class="form-group">
                            <label>Print Camera</label>
                            <div class="btn-group" data-toggle="buttons">
                                <label class="btn btn-default" ng-class="{'active btn-success': System.cameraInfo.print_camera === 'true'}">
                                    <input type="radio" ng-model="System.cameraInfo.print_camera" value="true"> Yes
                                </label>
                                <label class="btn btn-default" ng-class="{'active btn-danger': System.cameraInfo.print_camera === 'false'}">
                                    <input type="radio" ng-model="System.cameraInfo.print_camera" value="false"> No
                                </label>
                            </div>
                            <small class="text-muted" ng-if="System.cameraInfo.print_camera === 'true'">Camera will print on ticket</small>
                            <small class="text-muted" ng-if="System.cameraInfo.print_camera === 'false'">Camera will not print on ticket</small>
                        </div>
                        <div class="form-group">
                            <button type="submit" class="btn btn-black">
                                <i class="glyphicon glyphicon-save"></i> Save
                            </button>
                            <button type="button" class="btn btn-danger pull-right" ng-click="System.isEditing = false">
                                <i class="glyphicon glyphicon-exclamation-sign"></i> Cancel
                            </button>
                        </div>
                    </form>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <button type="button" class="btn btn-black" ng-click="System.previewCamera()">
                            <i class="glyphicon glyphicon-eye-open"></i> Preview Camera
                        </button>
                    </div>
                    <div class="preview-container" ng-if="System.cameraPreview">
                        <img ng-src="data:image/jpeg;base64,{{System.cameraPreview}}" alt="camera preview" class="img-responsive" />
                    </div>
                </div>
            </div>
            <div ng-hide='System.isEditing'>
                <table datatable="ng" class="table table-striped table-bordered" ng-if="System.cameraList.length">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>IP Address</th>
                            <th>Site</th>
                            <th>Company</th>
                            <th>Updated At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-ng-repeat="data in System.cameraList">
                            <td data-ng-bind="data.name"></td>
                            <td data-ng-bind="data.ip_address"></td>
                            <td data-ng-bind="data.site"></td>
                            <td data-ng-bind="data.company"></td>
                            <td data-ng-bind="data.updated_at"></td>
                            <td>
                                <button type="button" data-ng-click="System.showEditForm(data)" class="btn btn-black btn-sm btn-icon icon-left">
                                    Edit
                                </button>
                                <button type="button" data-ng-click="System.deleteCamera(data)" class="btn btn-danger btn-sm btn-icon icon-left">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
