<page-title ng-if="layoutOptions.pageTitles" title="Weighing List" description=""
  data-ng-init="System.initialize()"></page-title>
<div class="col-lg-12 col-md-12 hidden-print ">
  <div class="panel panel-color panel-info">
    <div class="panel-heading hidden-print">
      <div class="col-md-4 col-sm-6 col-xs-12">
        <h2>Weighing List</h2>
      </div>
      <div class="col-md-4 col-sm-6 col-xs-12">
        <div class="form-group">
          <label for="company_id" class="control-label">Company</label>
          <select id="company_id" name="company_id" ng-if="!System.User.company_id"
            ng-model="System.HeaderSingle.company_id" class="form-control" ng-change="System.SelectOnChange('company')"
            ng-options="option.value as option.name for option in System.Companies">
          </select>
          <label class="form-control" for="company_name" ng-if="System.User.company_id">{{
            System.Companies.registered_name}}</label>
        </div>
        <div class="form-group" ng-if="System.HeaderSingle.company_id !== null">
          <label for="site_id" class="control-label">Site</label>
          <select id="site_id" name="site_id" ng-if="!System.User.site_id" ng-model="System.HeaderSingle.site_id"
            class="form-control" ng-change="System.SelectOnChange('site')"
            ng-options="option.value as option.name for option in System.Sites">
          </select>
          <label class="form-control" for="site_name" ng-if="System.User.site_id">{{
            System.Sites[0].name}}</label>
        </div>
      </div>
      <div class="col-md-4 col-sm-6 col-xs-12">
        <div>
          <div class="form-group" ng-if="System.HeaderSingle.site_id !== null">
            <label for="workstation_id" class="control-label">Workstation</label>
            <select name="workstation_id" id="workstation_id" ng-if="!System.User.workstations_id"
              ng-model="System.HeaderSingle.workstation_id" class="form-control"
              ng-change="System.SelectOnChange('workstation')"
              ng-options="option.value as option.name for option in System.Workstations">
            </select>
            <label class="form-control" for="workstation_name" ng-if="System.User.workstations_id">{{
              System.Workstations[0].name}}</label>
          </div>
        </div>
        <div class="form-group" ng-if="System.HeaderSingle.workstation_id !== null || (System.Site.shared_workstation === 'Yes' && System.HeaderSingle.site_id !== null)">
          <button data-ng-click="System.addForm()" ng-hide='System.FormDisplay' class="btn btn-black pull-right">
            Add New
          </button>
        </div>
      </div>
    </div>

    <div class="row" ng-hide='System.FormDisplay || System.deleteFormDisplay'>
      <div class="col-sm-12">
        <table datatable="ng" class="table table-striped table-bordered">
          <thead>
            <tr>
              <th>Transaction</th>
              <th>Weighing Type</th>
              <th>Reg Number</th>
              <th>Product</th>
              <th>Business Partner</th>
              <th>First Weight</th>
              <th>Updated At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr data-ng-repeat="data in System.formData| filter: showweighings">
              <td data-ng-bind="data.transaction"></td>
              <td data-ng-bind="data.settings"></td>
              <td data-ng-bind="data.RegNumber"></td>
              <td data-ng-bind="data.product"></td>
              <td data-ng-bind="data.businesspartner"></td>
              <td data-ng-bind="data.FirstWeight"></td>
              <td data-ng-bind="data.updated_at"></td>
              <td>
                <a href="javascript:void(0)" data-ng-click="System.viewData(data);" ng-if="data.status === 'CLOSED'"
                  class="btn btn-black btn-sm btn-icon icon-left">Reprint</a>
                <a href="#/app/verify" ng-if="data.status === 'VERIFY'"
                  class="btn btn-danger btn-sm btn-icon icon-left">Verify</a>
                <a href="javascript:void(0)" data-ng-click="System.editForm(data);" ng-if="data.status === 'OPEN'"
                  class="btn btn-danger btn-sm btn-icon icon-left">2nd Weighing</a>
                <a ng-hide="System.User.role.delete_transaction_flag === 'false'" href="javascript:void(0)"
                  data-ng-click="System.deleteForm(data);" ng-if="data.status === 'OPEN' || data.status === 'VERIFY'"
                  class="btn btn-black btn-sm btn-icon icon-left">Delete</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="row" ng-if="System.deleteFormDisplay && !System.FormDisplay">
      <div>
          <h2>Reason</h2>
      </div>
      <div class="form-group">
          <textarea id="reasonBox" rows="5" ng-model="System.deleteReason" class="form-control" placeholder="Please enter your reason...">
          </textarea>
      </div>
      <div>
          <button class="btn btn-danger btn-sm btn-icon icon-left" data-ng-click="System.delete(data);">Delete</button>
          <button class="btn btn-black btn-sm btn-icon icon-left ng-scope" data-ng-click="System.cancel();">Cancel</button>
      </div>
  </div>
  </div>
</div>
