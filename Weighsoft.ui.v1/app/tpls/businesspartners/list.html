<page-title ng-if="layoutOptions.pageTitles" title="Business Partners" description="" data-ng-init="System.load()"></page-title>

<div class="col-lg-12 col-md-12 ">
    <div class="panel panel-color panel-danger">
        <div class="panel-heading">
            <div class="col-md-4 col-sm-6 col-xs-12">
                <h2>Business Partners Management</h2>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <div class="form-group">
                    <label for="company_id" class="control-label">Company</label>
                    <select name="company_id" id="role_id" ng-model="System.HeaderSingle.company_id" class="form-control" ng-change="System.changeCompanyID()" ng-options="option.value as option.name for option in System.Companies">
                    </select>
                </div>
                <div class="form-group" ng-if="System.HeaderSingle.company_id">
                    <label for="site_id" class="control-label">Site</label>
                    <select name="site_id" id="site_id" ng-model="System.HeaderSingle.site_id" class="form-control" ng-options="option.value as option.name for option in System.Sites" ng-change="System.changeSiteID()">
                    </select>
                </div>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <a href="javascript:void(0)" data-ng-click="System.addForm()" ng-hide='System.FormDisplay' class="btn btn-black pull-right">
                    Add New
                </a>
            </div>
        </div>
        <div class="panel-body">
            <div class="row">
                <div class='col-sm-12' ng-if="System.FormDisplay">
                    <h3>Add / Edit</h3>
                    <form name="CRUD" sf-schema="System.schema" sf-form="System.form" sf-model="System.Single" ng-submit="System.save(CRUD)"></form>
                    
                    <!-- Linked Hauliers Display (Read-only) -->
                    <div ng-if="System.ShowLinkedHauliers" class="panel panel-default" style="margin-top: 20px;">
                        <div class="panel-heading">
                            <h4 class="panel-title">
                                <i class="fa fa-truck"></i> Linked Hauliers (Smart Hauliers)
                            </h4>
                        </div>
                        <div class="panel-body">
                            <p class="text-muted">These hauliers are linked to this business partner. To manage the link, edit the haulier in the Hauliers screen.</p>
                            <table class="table table-striped table-bordered table-condensed">
                                <thead>
                                    <tr>
                                        <th>Code</th>
                                        <th>Name</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr ng-repeat="haulier in System.LinkedHauliers">
                                        <td>{{haulier.code}}</td>
                                        <td>{{haulier.name}}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row" ng-hide='System.FormDisplay'>
                <div class="col-sm-12">
                    <table datatable="ng" dt-options="System.dtOptions" class="table table-striped table-bordered" ng-if="System.hasData">
                        <thead>
                            <tr>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Updated At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr data-ng-repeat="data in System.formData">
                                <td data-ng-bind="data.code"></td>
                                <td data-ng-bind="data.name_only"></td>
                                <td data-ng-bind="data.updated_at"></td>
                                <td>
                                    <a href="javascript:void(0)" data-ng-click="System.editForm(data)" class="btn btn-black btn-sm btn-icon icon-left">Edit </a>
                                    <a href="javascript:void(0)" data-ng-click="System.delete(data)" class="btn btn-danger btn-sm btn-icon icon-left">Delete</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
