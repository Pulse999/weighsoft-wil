<div id="contractTransactionsDiv" class="hidden-print" ng-hide="System.FormDisplay">
    <table datatable="ng" class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Contract Name</th>
                <th>Company</th>
                <th>Amount in KG</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr data-ng-repeat="data in System.contractTransactions">
                <td data-ng-bind="data.contract_name"></td>
                <td data-ng-bind="System.ReportData.Company.registered_name"></td>
                <td data-ng-bind="data.amount"></td>

                <td>
                    <button type="button" ng-if="false" data-ng-click="System.reprintTicket(data)"
                        class="btn btn-black btn-sm btn-icon icon-left">
                        Reprint
                    </button>
                    <button type="button" ng-if="false" data-ng-click="System.deleteTransaction(data)"
                        class="btn btn-danger btn-sm btn-icon icon-left">
                        Delete
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
    <button type="button" data-ng-click="System.goBackToContracts()" class="btn btn-black pull-left">
        Back to Contracts
    </button>
</div>

<div class="col-lg-12 col-md-12 col-sm-12 hidden-screen">
    <ticket-print site="System.Site" setting="System.Setting" report-data="System.ReportData"
        weighing-header="System.Single" axel-setups="AxelSetups" cameras="System.cam"></ticket-print>
    <div class="page-header" ng-if="System.Setting.invoice_enabled==='true'">
        <invoice-print single="System.Single" invoice="System.invoice" report-data="System.ReportData"
            setting="System.Setting">
        </invoice-print>
    </div>
</div>

<div class="col-lg-12 col-md-12 hidden-print" ng-if="System.FormDisplay">
    <div class="row" ng-if="System.FormDisplay">
        <div class="col-md-6">
            <button class="btn btn-danger" ng-click="System.print()">Print</button>
        </div>
        <div class="col-md-6">
            <button class="btn btn-black pull-right" ng-click="System.FormDisplay=false">Cancel</button>
        </div>
    </div>
    <ticket-print site="System.Site" report-data="System.ReportData" weighing-header="System.Single"
        axel-setups="AxelSetups" cameras="System.cam"></ticket-print>
    <br>
    <div class="col-sm-12 page-header invoice" ng-if="System.Setting.invoice_enabled==='true'">
        <invoice-print single="System.Single" invoice="System.invoice" report-data="System.ReportData"
            setting="System.Setting">
        </invoice-print>
    </div>
    <br>
    <button type="button" data-ng-click="System.FormDisplay=false" class="btn btn-black pull-right">
        Back to Transactions
    </button>
</div>
