
<div>
    <table datatable="ng" class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Contract Name</th>
                <th>Business Partner</th>
                <th>Weight in {{System.Site.measure_type}}</th>
                <th>Product</th>
                <th>Expiry Date</th>

                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr data-ng-repeat="data in System.contractList">
                <td data-ng-bind="data.name"></td>
                <td data-ng-bind="data.businesspartner"></td>
                <td data-ng-bind="data.amount"></td>
                <td data-ng-bind="data.product"></td>
                <td data-ng-bind="data.expiry_date"></td>

                <td>
                    <button type="button" ng-if="data.has_transaction" data-ng-click="System.showTransactions(data)" class="btn btn-black btn-sm btn-icon icon-left">
                        View Transaction
                    </button>
                    <button type="button" ng-if="!data.has_transaction" data-ng-click="System.showEditForm(data)" class="btn btn-black btn-sm btn-icon icon-left">
                        Edit&nbsp;&nbsp;
                    </button>
                    <button type="button" ng-if="!data.has_transaction" data-ng-click="System.deleteWeighbridge(data)" class="btn btn-danger btn-sm btn-icon icon-left">
                        Delete
                    </button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
