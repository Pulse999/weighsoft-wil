
<page-title ng-if="layoutOptions.pageTitles" title="Dashboard" description="" data-ng-init="System.load()"></page-title>

<div class="col-lg-12 col-md-12 ">
  <div class="panel panel-color panel-danger">
    <div class="panel-heading">
      <div class="col-md-4">
        <h2>Dashboard Weighing</h2>
      </div>
      <form name="FILTER" sf-schema="System.headerSchema" sf-form="System.headerForm" sf-model="System.HeaderSingle"></form>
    </div>
    <div class="panel-body" id="dashboard">
      <div class="row">
        <div class='col-sm-12'>
          <h3>{{System.weighservice}}</h3>
          <div class="col-sm-12 col-md-6 col-lg-4" ng-repeat="weighbridge in System.weighbridges" >

            <div class="xe-widget xe-counter-block xe-counter-block-{{weighbridge.type}}">
              <div class="xe-upper">

                <div class="xe-icon">
                  <i class="fa-list-alt"></i>
                </div>
                <div class="xe-label">
                  <strong class="num">{{weighbridge.weight}}</strong>
                  <span>{{weighbridge.weighbridges_name}}</span>
                </div>

              </div>
              <div class="xe-lower">
                <div class="border"></div>

                <span>Transaction</span>
                <strong xe-counter data-count="this" data-from="0" data-to="{{weighbridge.transactions}}" data-duration="1"></strong>
              </div>
            </div>

          </div>
        </div>
      </div>
      <div class="row">      
        <div class="col-sm-12">
          <h3>Weighings</h3>
          <table datatable="ng" class="table table-striped table-bordered" ng-if="System.hasData">
            <thead>
              <tr>
                <th>Reg Number</th>
                <th>Weighbridge</th>
                <th>Status</th>
                <th>Updated At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>

              <tr data-ng-repeat="data in System.formData">
                <td data-ng-bind="data.reg_number"></td>
                <td data-ng-bind="data.weighbridge"></td>
                <td data-ng-bind="data.status"></td>
                <td data-ng-bind="data.updated_at"></td>
                <td><a href="javascript:void(0)" data-ng-click="System.viewData(data)" 
                       ng-if="data.status=='Closed'" class="btn btn-black btn-sm btn-icon icon-left">View</a>
                  <a href="javascript:void(0)" data-ng-click="System.finalize(data)" 
                     ng-if="data.status=='Open'" class="btn btn-danger btn-sm btn-icon icon-left">Finish</a></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>


    </div>
  </div>
</div>
