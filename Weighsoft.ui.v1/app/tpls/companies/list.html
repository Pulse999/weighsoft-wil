<page-title ng-if="layoutOptions.pageTitles" title="Companies" description="" data-ng-init="System.initialize()"></page-title>
<div class="col-lg-12 col-md-12">
    <div class="panel panel-color panel-danger">
        <div class="panel-heading">
            <h2>Company Management</h2>
            <button type="button" data-ng-click="System.showAddForm()" ng-hide='System.isEditing' class="btn btn-black pull-right">
                Add New
            </button>
        </div>
        <div class="panel-body">
            <div ng-if="System.isEditing">
                <h3>Add / Edit</h3>
                <form name="CRUD" ng-submit="System.saveForm(CRUD)">
                    <div class="row">
                        <div class="col-md-6 col-sm-12">
                            <fieldset>
                                <legend>Company Information</legend>
                                <div class="form-group">
                                    <label for="code">Code</label>
                                    <input type="text" id="code" ng-model="System.companyInfo.code" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="registered_name">Registered Name</label>
                                    <input type="text" id="registered_name" ng-model="System.companyInfo.registered_name" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="tel">Tel</label>
                                    <input type="text" id="tel" ng-model="System.companyInfo.tel" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="fax">Fax</label>
                                    <input type="text" id="fax" ng-model="System.companyInfo.fax" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" ng-model="System.companyInfo.email" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="registration_number">Registration Number</label>
                                    <input type="text" id="registration_number" ng-model="System.companyInfo.registration_number" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="vat_nr">VAT Nr</label>
                                    <input type="text" id="vat_nr" ng-model="System.companyInfo.vat_nr" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="contact_person">Contact Person</label>
                                    <input type="text" id="contact_person" ng-model="System.companyInfo.contact_person" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="cell">Cell</label>
                                    <input type="text" id="cell" ng-model="System.companyInfo.cell" class="form-control"/>
                                </div>
                            </fieldset>
                        </div>
                        <div class="col-md-6 col-sm-12">
                            <fieldset>
                                <legend>Street Address</legend>
                                <div class="form-group">
                                    <label for="street">Street</label>
                                    <input type="text" id="street" ng-model="System.companyInfo.street" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="suburb1">Suburb</label>
                                    <input type="text" id="suburb1" ng-model="System.companyInfo.suburb1" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="city1">City</label>
                                    <input type="text" id="city1" ng-model="System.companyInfo.city1" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="postal_code1">Postal Code</label>
                                    <input type="text" id="postal_code1" ng-model="System.companyInfo.postal_code1" class="form-control"/>
                                </div>
                            </fieldset>
                            <fieldset>
                                <legend>Postal Address</legend>
                                <div class="form-group">
                                    <label for="po_box">PO Box</label>
                                    <input type="text" id="po_box" ng-model="System.companyInfo.po_box" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="suburb2">Suburb</label>
                                    <input type="text" id="suburb2" ng-model="System.companyInfo.suburb2" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="city2">City</label>
                                    <input type="text" id="city2" ng-model="System.companyInfo.city2" class="form-control"/>
                                </div>
                                <div class="form-group">
                                    <label for="postal_code2">Postal Code</label>
                                    <input type="text" id="postal_code2" ng-model="System.companyInfo.postal_code2" class="form-control"/>
                                </div>
                            </fieldset>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 col-sm-12">
                            <fieldset>
                                <legend>Invoice Terms</legend>
                                <div class="form-group">
                                    <label for="terms">Terms</label>
                                    <textarea id="terms" ng-model="System.companyInfo.terms" class="form-control"></textarea>
                                </div>
                            </fieldset>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 col-sm-12">
                            <div class="form-group">
                                <label for="display_custom_logo_img" class="col-md-6">Logo Image</label>
                                <img ng-if="System.companyInfo.display_custom_logo_img" ng-src="data:image/png;base64,{{System.companyInfo.display_custom_logo_img}}" class="img-thumbnail col-md-6" alt="Responsive image">
                                <input type="file" class="col-md-6" onchange="angular.element(this).scope().System.uploadImageAsBase64(this.files[0])"/>
                                <button type="button" class="btn btn-default btn-xs col-md-6" ng-if="System.companyInfo.display_custom_logo_img" data-ng-click="System.removeLogo()">
                                    Remove Logo
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 col-sm-12">
                            <fieldset>
                                <legend>Smart Hauliers Feature</legend>
                                <div class="form-group">
                                    <label class="checkbox-inline">
                                        <input type="checkbox" id="smart_hauliers" ng-model="System.companyInfo.smart_hauliers" ng-true-value="1" ng-false-value="0"/>
                                        Enable Smart Hauliers (Auto-select haulier based on vehicle registration)
                                    </label>
                                </div>
                            </fieldset>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12 col-sm-12">
                            <fieldset>
                                <legend>Actions</legend>
                                <div class="form-group">
                                    <button type="submit" class="btn btn-black col-xs-6">
                                        <i class="glyphicon glyphicon-save"></i> Save
                                    </button>
                                    <button type="button" class="btn btn-danger col-xs-6 text-center" data-ng-click="System.isEditing = false">
                                        <i class="glyphicon glyphicon-exclamation-sign"></i> Cancel
                                    </button>
                                </div>
                            </fieldset>
                        </div>
                    </div>
                </form>
            </div>
            <div ng-hide='System.isEditing'>
                <table datatable="ng" class="table table-striped table-bordered" ng-if="System.companyList.length">
                    <thead>
                        <tr>
                            <th>Company Code</th>
                            <th>Company Name</th>
                            <th>Updated At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-ng-repeat="data in System.companyList">
                            <td data-ng-bind="data.code"></td>
                            <td data-ng-bind="data.registered_name"></td>
                            <td data-ng-bind="data.updated_at"></td>
                            <td>
                                <button type="button" data-ng-click="System.showEditForm(data)" class="btn btn-black btn-sm btn-icon icon-left">
                                    Edit
                                </button>
                                <button type="button" data-ng-click="System.deleteCompany(data)" class="btn btn-danger btn-sm btn-icon icon-left">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
