<page-title ng-if="layoutOptions.pageTitles" title="Manage Company"></page-title>

<div class="row down-position">
	<div class="col-md-12">
		<div class="panel panel-color panel-danger">
			<div class="panel-heading">
				Work Station Edit
			</div>

			<br/>
			<div class="panel-body">
				<form role="form" class="row form-horizontal" role="form">
					<div class="col-md-2"></div>
					<div class="form-group col-md-8">
						<div class="form-group">
							<label class="col-sm-3 control-label" for="field-1">Site:</label>

							<div class="col-sm-6">
								<select class="form-control" ng-model="point_info.site_type">
									<option>{{point_info.site_type}}</option>
									<option ng-repeat="site_info in site_infos" value="{{site_info.site_type}}">{{site_info.site_type}}</option>
								</select>
							</div>
						</div>

						<div class="form-group">
							<label class="col-sm-3 control-label" for="field-1">Work Station:</label>

							<div class="col-sm-6">
								<input type="text" class="form-control" id="field-1" ng-model="point_info.point_type">
							</div>
						</div>

						<div class="form-group">
							<label class="col-sm-3 control-label" for="field-1">Name:</label>

							<div class="col-sm-6">
								<input type="text" class="form-control" id="field-1" ng-model="point_info.point_name">
							</div>
						</div>

						<div class="form-group">
							<label class="col-sm-3 control-label" for="field-1">Active:</label>
							<div class="col-sm-6">
								<input type="checkbox" checked class="iswitch iswitch-secondary" ng-model="point_info.point_active" ng-true-value="'true'" ng-false-value="'false'">
							</div>
						</div>	

						<div class="form-group">
						    <label class="col-sm-12 control-label left-label" for="field-1">Weighbridges:</label>
                            <button class="btn btn-primary left-btn" ng-click="WeighbridgeCreate();">New Weighbridge</button>
							<div class="col-md-10">
								<table class="table table-bordered table-striped" id="example-2">
									<thead>
										<tr>
											<th>Code</th>
											<th>Name</th>
											<th>Active</th>
											<th>Edit</th>
										</tr>
									</thead>
									
									<tbody class="middle-align">
									
										<tr ng-repeat="info in point_info.weighbridge">
											<td>{{info.instanceid}}</td>
											<td>{{info.header}}</td>
											<td  ng-if="info.is_requested == 'true'"><div class="label label-secondary">Active</div></td>
											<td  ng-if="info.is_requested == 'false' || info.is_requested == ''"><div class="label label-purple">InActive</div></td>
											<td>
												<button ng-click="ManageWeighbridge(info.id);" class="btn btn-secondary btn-sm btn-icon icon-left">
													Manage
												</button>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>

						<div class="form-group col-md-12 left-btn">
							<button class="btn btn-blue" ng-click="PointUpdate(point_info.id);">Save</button>
							<button class="btn btn-blue cancel" ng-click="PointUpdateCancel()">Cancel</button>
						</div>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
