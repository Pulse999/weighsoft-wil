<page-title ng-if="layoutOptions.pageTitles" title="Settings" description="" data-ng-init="System.load()"></page-title>

<div class="col-lg-12 col-md-12">
    <div class="panel panel-color panel-danger">
        <div class="panel-heading">
            <div class="col-md-4 col-sm-6 col-xs-12">
                <h2>Weighing Types</h2>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <div class="form-group">
                    <label for="company_id" class="control-label">Company</label>
                    <select id="company_id" name="company_id" ng-model="System.HeaderSingle.company_id"
                        class="form-control" ng-change="System.onSelectChange('company')"
                        ng-options="option.value as option.name for option in System.companyList"></select>
                </div>
                <div class="form-group">
                    <label for="site_id" class="control_label">Site</label>
                    <select id="site_id" name="site_id" ng-model="System.HeaderSingle.site_id" class="form-control"
                        ng-change="System.onSelectChange('site')"
                        ng-options="option.value as option.name for option in System.siteList"></select>
                </div>
            </div>
            <div class="col-md-4 col-sm-6 col-xs-12">
                <div class="form-group">
                    <label for="workstation_id" class="control-label">Workstation</label>
                    <select id="workstation_id" name="workstation_id" ng-model="System.HeaderSingle.workstation_id"
                        class="form-control" ng-change="System.onSelectChange('workstation')"
                        ng-options="option.value as option.name for option in System.workstationList"></select>
                </div>
                <div class="form-group" ng-if="System.HeaderSingle.workstation_id">
                    <button data-ng-click="System.addForm()" ng-hide="System.FormDisplay"
                        class="btn btn-black pull-right">
                        Add New
                    </button>
                </div>
            </div>
        </div>
        <div class="panel-body">
            <div class="row">
                <div class="col-sm-12" ng-if="System.FormDisplay">
                    <div class="row row-border">
                        <div class="col-md-12 col-sm-12 col-xs-12 well">
                            <div class="form-group">
                                <label for="name" class="col-md-4 control-label">Name</label>
                                <div class="col-md-4">
                                    <input id="name" type="" class="form-control" name="name"
                                        ng-model="System.Single.name" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row row-border">
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="haulier" class="col-md-6 control-label">Haulier</label>
                            <div class="col-md-6">
                                <input id="haulier" type="checkbox" class="iswitch-lg iswitch-danger" name="haulier"
                                    ng-model="System.Single.haulier" ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="use_product_list" class="col-md-6 control-label">Use Product List</label>
                            <div class="col-md-6">
                                <input id="use_product_list" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="use_product_list" ng-model="System.Single.use_product_list"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="stored_tares" class="col-md-6 control-label">Tares</label>
                            <div class="col-md-6">
                                <select id="stored_tares" class="form-control" name="stored_tares"
                                    ng-model="System.Single.stored_tares">
                                    <option value="None">None</option>
                                    <option value="Manual">Manual</option>
                                    <option value="Stored">Stored</option>
                                    <option value="Both">Both</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="stored_tares" class="col-md-6 control-label">Number Plate 1</label>
                            <div class="col-md-6">
                                <input id="numberplate_1" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="numberplate_1" ng-model="System.Single.numberplate_1" ng-true-value="'Yes'"
                                    ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.numberplate_1 == 'Yes'">
                            <label for="stored_tares" class="col-md-6 control-label">NP Recog on 1</label>
                            <div class="col-md-6">
                                <input id="numberplate_recognition" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="numberplate_recognition" ng-model="System.Single.numberplate_recognition"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.numberplate_1 == 'Yes'">
                            <label for="stored_tares" class="col-md-6 control-label">Number Plate 2</label>
                            <div class="col-md-6">
                                <input id="numberplate_2" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="numberplate_2" ng-model="System.Single.numberplate_2" ng-true-value="'Yes'"
                                    ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.numberplate_2 == 'Yes'">
                            <label for="stored_tares" class="col-md-6 control-label">Number Plate 3</label>
                            <div class="col-md-6">
                                <input id="numberplate_3" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="numberplate_3" ng-model="System.Single.numberplate_3" ng-true-value="'Yes'"
                                    ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="business_partner" class="col-md-6 control-label">Business Partner</label>
                            <div class="col-md-6">
                                <input id="business_partner" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="business_partner" ng-model="System.Single.business_partner"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="contract" class="col-md-6 control-label">Enable Contracts</label>
                            <div class="col-md-6">
                                <input id="contract" type="checkbox" class="iswitch-lg iswitch-danger" name="contract"
                                    ng-model="System.Single.contract_enabled" ng-true-value="'true'"
                                    ng-false-value="'false'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="type_of_weighing" class="col-md-6 control-label">Type of Weighing</label>
                            <div class="col-md-6">
                                <select id="type_of_weighing" class="form-control" name="type_of_weighing"
                                    ng-model="System.Single.type_of_weighing">
                                    <option value="1">Single</option>
                                    <option value="2">Double</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="pallet" class="col-md-6 control-label">Enable Pallets</label>
                            <div class="col-md-6">
                                <input id="pallet" type="checkbox" class="iswitch-lg iswitch-danger" name="pallet"
                                    ng-model="System.Single.pallet_enabled" ng-true-value="'true'"
                                    ng-false-value="'false'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="pallet" class="col-md-6 control-label">Enable Tares</label>
                            <div class="col-md-6">
                                <input id="tares" type="checkbox" class="iswitch-lg iswitch-danger" name="tares"
                                    ng-model="System.Single.tares_enabled" ng-true-value="'true'"
                                    ng-false-value="'false'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="invoice" class="col-md-6 control-label">Invoice</label>
                            <div class="col-md-6">
                                <input id="invoice" type="checkbox" class="iswitch-lg iswitch-danger" name="invoice"
                                    ng-model="System.Single.invoice_enabled" ng-true-value="'true'"
                                    ng-false-value="'false'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="first_can_axel" class="col-md-6 control-label">First weight Axel</label>
                            <div class="col-md-6">
                                <select id="first_can_axel" class="form-control" name="first_can_axel"
                                    ng-model="System.Single.first_can_axel">
                                    <option value="Off">Off</option>
                                    <option value="On_Cumulative">On Cumulative</option>
                                    <option value="On_Compulsory">Compulsory Cumulative</option>
                                    <option value="On_Inmotion">On Inmotion</option>
                                    <option value="Compulsory_Inmotion">Compulsory Inmotion</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.type_of_weighing == 2">
                            <label for="second_can_axel" class="col-md-6 control-label">Second weight Axel</label>
                            <div class="col-md-6">
                                <select id="second_can_axel" class="form-control" name="second_can_axel"
                                    ng-model="System.Single.second_can_axel">
                                    <option value="Off">Off</option>
                                    <option value="On_Cumulative">On Cumulative</option>
                                    <option value="Compulsory_Cumulative">Compulsory Cumulative</option>
                                    <option value="On_Inmotion">On Inmotion</option>
                                    <option value="Compulsory_Inmotion">Compulsory Inmotion</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.type_of_weighing == 2">
                            <label for="goods_type" class="col-md-6 control-label">Goods Type</label>
                            <div class="col-md-6">
                                <select id="goods_type" class="form-control" name="goods_type"
                                    ng-model="System.Single.goods_type">
                                    <option value="1">Receiving Goods</option>
                                    <option value="2">Dispatching Goods</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="print_ticket" class="col-md-6 control-label">Print Ticket</label>
                            <div class="col-md-6">
                                <select id="print_ticket" class="form-control" name="print_ticket"
                                    ng-model="System.Single.print_ticket">
                                    <option value="1">First Weight</option>
                                    <option value="2">Second Weight</option>
                                    <option value="B">Both Weights</option>
                                    <option value="N">None</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="reprint" class="col-md-6 control-label">Reprint Tickets</label>
                            <div class="col-md-6">
                                <input id="reprint" type="checkbox" class="iswitch-lg iswitch-danger" name="reprint"
                                    ng-model="System.Single.reprint" ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="ticket_template" class="col-md-6 control-label">Ticket Template</label>
                            <div class="col-md-6">
                                <select id="ticket_template" class="form-control" name="ticket_template"
                                    ng-model="System.Single.ticket_template">
                                    <option value="normal">Normal Ticket</option>
                                    <option value="thermal">Thermal Ticket (72mm)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="custom_fields" class="col-md-6 control-label">Use Custom Fields</label>
                            <div class="col-md-6">
                                <input id="custom_fields" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="custom_fields" ng-model="System.Single.custom_fields" ng-true-value="'Yes'"
                                    ng-false-value="'No'" />
                            </div>
                        </div>

                        <div class="form-group col-md-6 col-sm-12">
                            <label for="enable_moisture" class="col-md-6 control-label">Enable Moisture</label>
                            <div class="col-md-6">
                                <input id="enable_moisture" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="enable_moisture" ng-model="System.Single.enable_moisture"
                                    ng-true-value="'true'" ng-false-value="'false'" />
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="enable_handling" class="col-md-6 control-label">Enable
                                {{System.handlingAlias}}</label>
                            <div class="col-md-6">
                                <input id="enable_handling" type="checkbox" class="iswitch-lg iswitch-danger"
                                    name="enable_handling" ng-model="System.Single.enable_handling"
                                    ng-true-value="'true'" ng-false-value="'false'" />
                            </div>
                        </div>
                    </div>
                    <div class="row row-border well well-sm">
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.custom_fields">
                            <label for="user_defined_input1" class="col-md-6">Input 1</label>
                            <div class="col-md-6">
                                <select name="user_defined_input1" id="user_defined_input1" class="form-control"
                                    ng-model="System.Single.user_defined_input1"
                                    ng-options="option.value as option.text for option in System.OptionTypes"></select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input1 != 'N'">
                            <label for="user_defined_name1" class="col-md-6">Name 1</label>
                            <div class="col-md-6"><input type="text" id="user_defined_name1" class="form-control"
                                    name="user_defined_name1" ng-model="System.Single.user_defined_name1" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12"
                            ng-if="System.Single.user_defined_input1 != 'N' && (System.Single.user_defined_input1 == 'SO' || System.Single.user_defined_input1 == 'SC')">
                            <label for="user_defined_val1" class="col-md-6">Values 1</label>
                            <div class="col-md-6"><input type="text" id="user_defined_val1" class="form-control"
                                    name="user_defined_val1" ng-model="System.Single.user_defined_val1" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input1 != 'N'">
                            <label for="user_defined_rep1" class="col-md-6">On Report 1</label>
                            <div class="col-md-6">
                                <input type="checkbox" id="user_defined_rep1" class="iswitch-lg iswitch-danger"
                                    name="user_defined_rep1" ng-model="System.Single.user_defined_rep1"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                    </div>
                    <div class="row row-border" ng-if="System.Single.user_defined_input1 != 'N' || System.Single.user_defined_input2 !== 'N'">
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="user_defined_input2" class="col-md-6">Input 2</label>
                            <div class="col-md-6">
                                <select name="user_defined_input2" id="user_defined_input2" class="form-control"
                                    ng-model="System.Single.user_defined_input2"
                                    ng-options="option.value as option.text for option in System.OptionTypes"></select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input2 != 'N'">
                            <label for="user_defined_name2" class="col-md-6">Name 2</label>
                            <div class="col-md-6"><input type="text" id="user_defined_name2" class="form-control"
                                    name="user_defined_name2" ng-model="System.Single.user_defined_name2" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12"
                            ng-if="System.Single.user_defined_input2 != 'N' && (System.Single.user_defined_input2 == 'SO' || System.Single.user_defined_input2 == 'SC')">
                            <label for="user_defined_val2" class="col-md-6">Values 2</label>
                            <div class="col-md-6"><input type="text" id="user_defined_val2" class="form-control"
                                    name="user_defined_val2" ng-model="System.Single.user_defined_val2" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input2 != 'N'">
                            <label for="user_defined_rep2" class="col-md-6">On Report 2</label>
                            <div class="col-md-6">
                                <input type="checkbox" id="user_defined_rep2" class="iswitch-lg iswitch-danger"
                                    name="user_defined_rep2" ng-model="System.Single.user_defined_rep2"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                    </div>
                    <div class="row row-border well well-sm" ng-if="System.Single.user_defined_input2 != 'N' || System.Single.user_defined_input3 !== 'N'">
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="user_defined_input3" class="col-md-6">Input 3</label>
                            <div class="col-md-6">
                                <select name="user_defined_input3" id="user_defined_input3" class="form-control"
                                    ng-model="System.Single.user_defined_input3"
                                    ng-options="option.value as option.text for option in System.OptionTypes"></select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input3 != 'N'">
                            <label for="user_defined_name3" class="col-md-6">Name 3</label>
                            <div class="col-md-6"><input type="text" id="user_defined_name3" class="form-control"
                                    name="user_defined_name3" ng-model="System.Single.user_defined_name3" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12"
                            ng-if="System.Single.user_defined_input3 != 'N' && (System.Single.user_defined_input3 == 'SO' || System.Single.user_defined_input3 == 'SC')">
                            <label for="user_defined_val3" class="col-md-6">Values 3</label>
                            <div class="col-md-6"><input type="text" id="user_defined_val3" class="form-control"
                                    name="user_defined_val3" ng-model="System.Single.user_defined_val3" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input3 != 'N'">
                            <label for="user_defined_rep3" class="col-md-6">On Report 3</label>
                            <div class="col-md-6">
                                <input type="checkbox" id="user_defined_rep3" class="iswitch-lg iswitch-danger"
                                    name="user_defined_rep3" ng-model="System.Single.user_defined_rep3"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                    </div>
                    <div class="row row-border" ng-if="System.Single.user_defined_input3 != 'N' || System.Single.user_defined_input4 !== 'N'">
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="user_defined_input4" class="col-md-6">Input 4</label>
                            <div class="col-md-6">
                                <select name="user_defined_input4" id="user_defined_input4" class="form-control"
                                    ng-model="System.Single.user_defined_input4"
                                    ng-options="option.value as option.text for option in System.OptionTypes"></select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input4 != 'N'">
                            <label for="user_defined_name4" class="col-md-6">Name 4</label>
                            <div class="col-md-6"><input type="text" id="user_defined_name4" class="form-control"
                                    name="user_defined_name4" ng-model="System.Single.user_defined_name4" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12"
                            ng-if="System.Single.user_defined_input4 != 'N' && (System.Single.user_defined_input4 == 'SO' || System.Single.user_defined_input4 == 'SC')">
                            <label for="user_defined_val4" class="col-md-6">Values 4</label>
                            <div class="col-md-6"><input type="text" id="user_defined_val4" class="form-control"
                                    name="user_defined_val4" ng-model="System.Single.user_defined_val4" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input4 != 'N'">
                            <label for="user_defined_rep4" class="col-md-6">On Report 4</label>
                            <div class="col-md-6">
                                <input type="checkbox" id="user_defined_rep4" class="iswitch-lg iswitch-danger"
                                    name="user_defined_rep4" ng-model="System.Single.user_defined_rep4"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                    </div>
                    <div class="row row-border well well-sm" ng-if="System.Single.user_defined_input4 != 'N' || System.Single.user_defined_input5 !== 'N'">
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="user_defined_input5" class="col-md-6">Input 5</label>
                            <div class="col-md-6">
                                <select name="user_defined_input5" id="user_defined_input5" class="form-control"
                                    ng-model="System.Single.user_defined_input5"
                                    ng-options="option.value as option.text for option in System.OptionTypes"></select>
                            </div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input5 != 'N'">
                            <label for="user_defined_name5" class="col-md-6">Name 5</label>
                            <div class="col-md-6"><input type="text" id="user_defined_name5" class="form-control"
                                    name="user_defined_name5" ng-model="System.Single.user_defined_name5" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12"
                            ng-if="System.Single.user_defined_input5 != 'N' && (System.Single.user_defined_input5 == 'SO' || System.Single.user_defined_input5 == 'SC')">
                            <label for="user_defined_val5" class="col-md-6">Values 5</label>
                            <div class="col-md-6"><input type="text" id="user_defined_val5" class="form-control"
                                    name="user_defined_val5" ng-model="System.Single.user_defined_val5" /></div>
                        </div>
                        <div class="form-group col-md-6 col-sm-12" ng-if="System.Single.user_defined_input5 != 'N'">
                            <label for="user_defined_rep5" class="col-md-6">On Report 5</label>
                            <div class="col-md-6">
                                <input type="checkbox" id="user_defined_rep5" class="iswitch-lg iswitch-danger"
                                    name="user_defined_rep5" ng-model="System.Single.user_defined_rep5"
                                    ng-true-value="'Yes'" ng-false-value="'No'" />
                            </div>
                        </div>
                    </div>
                    <div class="row row-border" ng-if="System.Single.user_defined_input5 != 'N' || System.Single.user_defined_input6 !== 'N'">
                        <div class="form-group col-md-6 col-sm-12">
                            <label for="user_defined_input6" class="col-md-6">Input 6</label>
                            <div class="col-md-6">
                                <select name="user_defined_input6" id="user_defined_input6" class="form-control"
                                    ng-model="System.Single.user_defined_input6"
                                    ng-options="option.value as option.text for option in System.OptionTypes"></select>
                            </div>
