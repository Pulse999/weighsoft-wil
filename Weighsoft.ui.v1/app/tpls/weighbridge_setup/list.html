<page-title ng-if="layoutOptions.pageTitles" title="Weighbridge_setup" description=""
    data-ng-init="System.initialize()"></page-title>
<div class="col-lg-12 col-md-12">
    <div class="panel panel-color panel-danger">
        <div class="panel-heading">
            <div class="col-md-4 col-sm-6 col-xs-12">
                <h2>Weighbridge Setup</h2>
            </div>
            <div class="col-md-8 col-sm-6 col-xs-12">
                <div class="form-group">
                    <button type="button" data-ng-click="System.showAddForm()" ng-hide='System.isEditing'
                        class="btn btn-black pull-right">
                        Add New
                    </button>
                </div>
            </div>
        </div>
        <div class="panel-body">
            <form class="row" ng-if="System.isEditing">
                <div class="col-md-12">
                    <h3>Add / Edit</h3>
                </div>
                <div class="form-group col-sm-12 col-md-6">
                    <label for="inputName" class="label label-danger">Scale Name</label>
                    <input type="text" class="form-control" id="inputName" placeholder="Name"
                        ng-model="System.weighbridgeInfo.name">
                    <input type="hidden" ng-model="System.weighbridgeInfo.record">
                </div>
                <div class="form-group col-sm-12 col-md-6">
                    <label for="inputbaud_rate" class="label label-danger">Baud Rate</label>
                    <select name="inputbaud_rate" id="inputbaud_rate" class="form-control"
                        ng-model="System.weighbridgeInfo.baudrate">
                        <option value="1200">1200</option>
                        <option value="2400">2400</option>
                        <option value="4800">4800</option>
                        <option value="9600">9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200">115200</option>
                        <option value="230400">230400</option>
                        <option value="460800">460800</option>
                        <option value="921600">921600</option>
                    </select>
                </div>
                <div class="form-group col-sm-12 col-md-6">
                    <label for="inputparity" class="label label-danger">Parity</label>
                    <select name="inputparity" id="inputparity" class="form-control"
                        ng-model="System.weighbridgeInfo.parity">
                        <option value="None">None</option>
                        <option value="Odd">Odd</option>
                        <option value="Even">Even</option>
                        <option value="Mark">Mark</option>
                        <option value="Space">Space</option>
                    </select>
                </div>
                <div class="form-group col-sm-12 col-md-6">
                    <label for="inputdata_bits" class="label label-danger">Data Bits</label>
                    <select name="inputdata_bits" id="inputdata_bits" class="form-control"
                        ng-model="System.weighbridgeInfo.databits">
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>
                <div class="form-group col-sm-6 col-md-2">
                    <label for="inputstop_bits" class="label label-danger">Stop Bits</label>
                    <select name="inputstop_bits" id="inputstop_bits" class="form-control"
                        ng-model="System.weighbridgeInfo.stopbits">
                        <option value="None">None</option>
                        <option value="One">One</option>
                        <option value="Two">Two</option>
                        <option value="OnePointFive">OnePointFive</option>
                    </select>
                </div>
                <div class="form-group col-sm-6 col-md-2">
                    <label for="inputweight_reg" class="label label-danger">String Separator:</label>
                    <input type="text" class="form-control" id="inputweight_sep" placeholder=";"
                        ng-model="System.weighbridgeInfo.seperator" ng-change="System.RegExChange()">
                </div>
                <div class="form-group col-sm-6 col-md-2">
                    <label for="inputweight_reg" class="label label-danger">Weight Length:</label>
                    <input type="text" class="form-control" id="inputweight_num_amt" placeholder=";"
                        ng-model="System.weighbridgeInfo.weight_num_amt" ng-change="System.RegExChange()">
                </div>
                <div class="form-group col-sm-6 col-md-2">
                    <label for="inputweight_reg" class="label label-danger">Special Char:</label>
                    <input id="inputweight_special" type="checkbox" class="iswitch-lg iswitch-danger"
                        name="inputweight_special" ng-model="System.weighbridgeInfo.weight_special"
                        ng-change="System.RegExChange()" ng-true-value="'Yes'" ng-false-value="'No'">
                </div>
                <div class="form-group col-sm-6 col-md-6">
                    <label for="inputweight_reg" class="label label-danger">Reg Ex:</label>
                    <input type="text" class="form-control" id="inputweight_reg" placeholder="[0-9\-]{6}"
                        ng-model="System.weighbridgeInfo.weight_reg" ng-readonly="true">
                </div>
                <div class="col-md-12">
                    <h3>Test Scale</h3>
                </div>
                <div class="form-group col-sm-12 col-md-6">
                    <label for="inputport_num" class="label label-danger">Scale Port Number</label>
                    <div class="input-group">
                        <select name="AvailablePorts" id="AvailablePorts" class="form-control"
                            ng-model="System.weighbridgeInfo.port_num">
                            <option ng-repeat="option in System.availablePorts" value="{{option.port}}"
                                ng-selected="System.weighbridgeInfo.port_num == option.port">{{option.name}}</option>
                        </select>
                        <span class="input-group-btn">
                            <button class="btn btn-danger" type="button" ng-click="System.refreshPorts()">
                                <i class="fa fa-refresh"></i>
                            </button>
                        </span>
                    </div>
                </div>
                <div class="form-group col-sm-12 well">
                    <div class="col-sm-4">
                        <label for="inputweight" class="label label-danger">Weight</label>
                        <input type="number" step="0.0001" readonly="readonly" class="form-control" id="inputweight"
                            placeholder="0" ng-model="System.weighbridgeInfo.weight">
                    </div>
                    <div class="col-sm-2">
                        <button class="btn btn-danger" ng-click="System.StartWeighing()">Start</button>
                    </div>
                    <div class="col-sm-2">
                        <button class="btn btn-black pull-right" ng-click="System.StopWeighing()">Stop</button>
                    </div>
                </div>
                <div class="col-md-12">
                    <h3>Remote Display</h3>
                </div>
                <div class="form-group col-sm-12 col-md-6">
                    <label for="inputin_reverse" class="label label-danger">Remote Display</label>
                    <input id="inputin_reverse" type="checkbox" class="iswitch-lg iswitch-danger" name="inputin_reverse"
                        ng-model="System.weighbridgeInfo.remote_display" ng-true-value="'Yes'" ng-false-value="'No'">
                </div>
                <div class="form-group col-sm-12 col-md-6" ng-if="System.weighbridgeInfo.remote_display == 'Yes'">
                    <label for="inputName" class="label label-danger">Display Name</label>
                    <input type="text" class="form-control" id="inputName" placeholder="Name"
                        ng-model="System.weighbridgeInfo.display_name">
                </div>
                <div class="form-group col-sm-12 col-md-6" ng-if="System.weighbridgeInfo.remote_display == 'Yes'">
                    <label for="inputbaud_rate" class="label label-danger">Display Baud Rate</label>
                    <select name="inputbaud_rate" id="inputbaud_rate" class="form-control"
                        ng-model="System.weighbridgeInfo.display_baudrate">
                        <option value="1200">1200</option>
                        <option value="2400">2400</option>
                        <option value="4800">4800</option>
                        <option value="9600">9600</option>
                        <option value="19200">19200</option>
                        <option value="38400">38400</option>
                        <option value="57600">57600</option>
                        <option value="115200">115200</option>
                        <option value="230400">230400</option>
                        <option value="460800">460800</option>
                        <option value="921600">921600</option>
                    </select>
                </div>
                <div class="form-group col-sm-12 col-md-6" ng-if="System.weighbridgeInfo.remote_display == 'Yes'">
                    <label for="inputparity" class="label label-danger">Display Parity</label>
                    <select name="inputparity" id="inputparity" class="form-control"
                        ng-model="System.weighbridgeInfo.display_parity">
                        <option value="None">None</option>
                        <option value="Odd">Odd</option>
                        <option value="Even">Even</option>
                        <option value="Mark">Mark</option>
                        <option value="Space">Space</option>
                    </select>
                </div>
                <div class="form-group col-sm-12 col-md-6" ng-if="System.weighbridgeInfo.remote_display == 'Yes'">
                    <label for="inputdata_bits" class="label label-danger">Display Data Bits</label>
                    <select name="inputdata_bits" id="inputdata_bits" class="form-control"
                        ng-model="System.weighbridgeInfo.display_databits">
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                    </select>
                </div>
                <div class="form-group col-sm-6 col-md-2" ng-if="System.weighbridgeInfo.remote_display == 'Yes'">
                    <label for="inputstop_bits" class="label label-danger">Display Stop Bits</label>
                    <select name="inputstop_bits" id="inputstop_bits" class="form-control"
                        ng-model="System.weighbridgeInfo.display_stopbits">
                        <option value="None">None</option>
                        <option value="One">One</option>
                        <option value="Two">Two</option>
                        <option value="OnePointFive">OnePointFive</option>
                    </select>
                </div>
                <div class="form-group col-sm-12">
                    <div class="col-sm-6">
                        <button class="btn btn-danger" ng-click="System.saveForm(System.weighbridgeInfo)">Save</button>
                    </div>
                    <div class="col-sm-6">
                        <button class="btn btn-danger pull-right" ng-click="System.cancelEdit()">Cancel</button>
                    </div>
                </div>
            </form>
            <div ng-hide="System.isEditing">
                <table datatable="ng" class="table table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Baud Rate</th>
                            <th>Parity</th>
                            <th>Data Bits</th>
                            <th>Stop Bits</th>
                            <th>Separator</th>
                            <th>Remote Display</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr data-ng-repeat="data in System.weighbridgeList">
                            <td data-ng-bind="data.name"></td>
                            <td data-ng-bind="data.baudrate"></td>
                            <td data-ng-bind="data.parity"></td>
                            <td data-ng-bind="data.databits"></td>
                            <td data-ng-bind="data.stopbits"></td>
                            <td data-ng-bind="data.seperator"></td>
                            <td data-ng-bind="data.remote_display || 'No'"></td>
                            <td>
                                <button type="button" data-ng-click="System.showEditForm(data)"
                                    class="btn btn-black btn-sm btn-icon icon-left">
                                    Edit
                                </button>
                                <button type="button" data-ng-click="System.deleteWeighbridge(data)"
                                    class="btn btn-danger btn-sm btn-icon icon-left">
                                    Delete
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
